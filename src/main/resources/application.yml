# Common + default profile: local development against the docker-compose Postgres.
# Profile-specific overrides live in application-<profile>.yml (e.g. application-dsql.yml),
# loaded when that profile is active (SPRING_PROFILES_ACTIVE=...).
spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/hellodb
    username: hellouser
    password: hellopassword
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  cloud:
    aws:
      # Don't even create the SSM client locally: the dsql profile re-enables this
      # (application-dsql.yml) so only Lambda talks to Parameter Store. The static
      # region keeps the core region provider happy without an AWS lookup locally.
      parameterstore:
        enabled: false
      region:
        static: ${AWS_REGION:us-east-1}

# JWT signing config. The dev secret below is only for local development; on AWS
# (the `dsql` profile) it is overridden by a random value read from SSM Parameter
# Store (see application-dsql.yml).
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-local-secret-change-me-please-32bytes-minimum}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:1440}
